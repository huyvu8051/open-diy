name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: huyvu8051/infra
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          path: infra

      - name: Update image tag in deployment.yaml
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
          DEPLOY_FILE="infra/argocd/manifests/open-diy/deployment.yaml"

          sed -i "s|image: ghcr.io/huyvu8051/open-diy:.*|image: ${IMAGE}|g" "$DEPLOY_FILE"

          echo "Updated image to: ${IMAGE}"
          grep "image:" "$DEPLOY_FILE"

      - name: Commit and push to infra repo
        run: |
          cd infra
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add argocd/manifests/open-diy/deployment.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(open-diy): update image to ${{ github.sha }}

Triggered by: ${{ github.repository }}@${{ github.sha }}
Workflow: ${{ github.workflow }}"
            git push
          fi
