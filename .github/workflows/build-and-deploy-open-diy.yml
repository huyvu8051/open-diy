name: Build and Push open-diy

on:
  push:
    branches: [main]
    paths:
      - 'open-diy/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout open-diy
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/huyvu8051/open-diy:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: open-diy
          file: open-diy/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/huyvu8051/open-diy:stable
            ghcr.io/huyvu8051/open-diy:latest

      - name: Trigger ArgoCD webhook
        if: always()
        run: |
          WEBHOOK="${ARGOCD_WEBHOOK:-}"
          if [ -z "$WEBHOOK" ]; then
            echo "ARGOCD_WEBHOOK is not set. Skipping ArgoCD sync."
            exit 0
          fi
          echo "Triggering ArgoCD webhook..."
          curl -sS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d '{}'
        env:
          ARGOCD_WEBHOOK: ${{ secrets.ARGOCD_WEBHOOK }}
